   JAVA_OPTS="-Xms8192m -Xmx12288m -XX:MetaspaceSize=512M -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/LENDperfect/APP_SERVER/Heap_Dump -Djava.net.preferIPv4Stack=true"
