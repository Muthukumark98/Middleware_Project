zuul:
  semaphore.max-semaphores: 500
#  ribbon-isolation-strategy: THREAD
#  threadPool:
#    useSeparateThreadPools: false

ribbon:
  ReadTimeout: 60000
  ConnectTimeout: 20000
  MaxConnectionsPerHost: 500
  MaxTotalConnections: 500
  eureka:
    enabled: true


#transunion.ribbon.MaxConnectionsPerHost: 500
#transunion.ribbon.MaxTotalConnections: 500

hystrix: 
  command: 
    default: 
      circuitBreaker.enabled: false
      fallback.enabled: true
      fallback.isolation.semaphore.maxConcurrentRequests: 100
      execution.isolation.semaphore.maxConcurrentRequests: 500
#  execution.isolation.thread.timeoutInMilliseconds: 60000
