info:
  component: Edge Server
  
endpoints:
  actuator:
    enabled: true
  restart:
    enabled: true
  shutdown:
    enabled: true
  health:
    sensitive: false

management:
  security:
    enabled: false       

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: https://cpprod.iob.in:1010/eureka/
    registerWithEureka: true
    fetchRegistry: true
      
logging:
  level:
    com.sai.connectperfect: trace
    org.springframework.jdbc: debug
    springfox.documentation: debug
    org.springframework.jdbc.core: trace
    
connectperfect: 
  enabledSecurityCheck: false
  allowedHosts: 'localhost,connectperfect.io'

#spring:
