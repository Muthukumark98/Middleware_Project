#      keepAliveTimeMinutes: 1
#      allowMaximumSizeToDivergeFromCoreSize: true
#      maximumSize: 300
#      maxQueueSize: 300
#      queueSizeRejectionThreshold: 300

 
spring:
  application:
    name: gateway
  http: 
    multipart: 
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  jmx:
    enabled: false    
  profiles: 
   active:
     ON_PREMISE
 
---
spring:
  profiles: ON_CLOUD   
datasource:
  connectperfect:
     url: jdbc:postgresql://192.168.0.172:5432/CP_ONCLOUD_UAT1
     username: postgres
     password: postgres
     driverClassName: org.postgresql.Driver
     testOnBorrow: true
     testWhileIdle: true
     timeBetweenEvictionRunsMillis: 30000
     minEvictableIdleTimeMillis: 30000
     validationQuery: SELECT 1
     max-active:  15
     max-idle: 10
     max-wait: 8000
     defaultSchema:
     maxPoolSize: 350
     hibernate:
           hbm2ddl.method:  none 
           show_sql: true
           format_sql: false
           dialect: org.hibernate.dialect.PostgreSQLDialect
connectperfect:
  packages: com.sai.connectperfect.common,com.sai.connectperfect.oncloud

server:
  port: 9153

zuul:
  sensitiveHeaders:
  host:
    socket-timeout-millis: 30000
  routes:    
    truthscreen: 
      path: /api/v1.0/cpts/**
      serviceId: truthscreen
    truthscreenv2: 
      path: /api/v2.0/cpts/**
      serviceId: truthscreen
      stripPrefix: false
    webui:
      path: /app/**
      serviceId: webui
    crimecheck:
      path: /api/v1.0/crimecheck/**
      serviceId: crimecheck
    signzy:  
      path: /api/v1.0/signzy/**
      serviceId: signzy
    karza:
      path: /api/v1.0/karza/**
      serviceId: karza
