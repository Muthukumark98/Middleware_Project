<IfModule !proxy_cluster_module>
    # mod_proxy_balancer should be disabled when mod_cluster is used
    LoadModule proxy_cluster_module modules/mod_proxy_cluster.so
    LoadModule cluster_slotmem_module modules/mod_cluster_slotmem.so
    LoadModule manager_module modules/mod_manager.so
    LoadModule advertise_module modules/mod_advertise.so

    MemManagerFile /lendweb/Apache_LOS/httpd/cache/mod_proxy_cluster


<IfModule manager_module>
Listen 172.31.4.54:1801
SSLProxyEngine on
SSLProxyVerify none
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyProtocol -all +TLSv1.2
SSLProxyCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:ECDHE-RSA-AES128-SHA:DHE-RSA-AES128-GCM-SHA256:AES256+EDH:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GC$
Maxnode 50
Maxhost 100
ManagerBalancerName lendperfect
LogLevel error 
<VirtualHost 172.31.4.54:1801>
<Directory />
Require all granted
</Directory>
SetEnv nokeepalive
ServerAdvertise on				
SSLEngine on
SSLProtocol  -all  +TLSv1.2
SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:ECDHE-RSA-AES128-SHA:DHE-RSA-AES128-GCM-SHA256:AES256+EDH:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GC$
SSLCertificateFile /LENDperfect/SSL_CERT/ARUN_SSL/IOB_CERT.crt
SSLCertificateKeyFile /LENDperfect/SSL_CERT/ARUN_SSL/IOB_KEY.key
SSLCACertificateFile /LENDperfect/SSL_CERT/ARUN_SSL/CAcert.cer
EnableMCPMReceive On
AdvertiseFrequency 50
<Location /modcluster>
SetHandler mod_cluster-manager
#Require ip 172.26.77.12
Require all granted
</Location>
</VirtualHost>
</IfModule>
</IfModule>
